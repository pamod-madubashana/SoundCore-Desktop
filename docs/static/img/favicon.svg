<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5A4"/>
      <stop offset="0.55" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <linearGradient id="bolt" x1="512" y1="300" x2="512" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded app tile -->
  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="208" fill="#ffffff" opacity="0.04"/>

  <!-- headphone band + earcups -->
  <g filter="url(#shadow)" stroke="#ECFEFF" stroke-width="46" fill="none" stroke-linecap="round">
    <path d="M312 560 V470 a200 200 0 0 1 400 0 V560"/>
  </g>
  <g fill="#ECFEFF" filter="url(#shadow)">
    <rect x="266" y="540" width="104" height="180" rx="46"/>
    <rect x="654" y="540" width="104" height="180" rx="46"/>
  </g>

  <!-- auto / instant bolt -->
  <path d="M548 372 L430 600 H512 L476 760 L612 520 H524 Z" fill="url(#bolt)" stroke="#155E75" stroke-width="12" stroke-linejoin="round"/>
</svg>
