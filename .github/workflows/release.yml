name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0). Defaults to package.json version.'
        required: false
        type: string

jobs:
  build:
    name: Build release bundles
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    
    # CRITICAL: This injects the environment variable globally into all sub-processes
    # so that Tauri's internal linuxdeploy calls will self-extract AppImages on GitHub runners
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libcairo2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libfuse2 \
            squashfs-tools \
            patchelf

      - name: Install dependencies
        run: |
          npm install
          npm --prefix ui install

      - name: Build Tauri bundle
        run: npm run tauri build

      - name: Prepare release assets
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          mkdir -p release-assets
          
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Debian
            for file in src-tauri/target/release/bundle/deb/*.deb; do
              [ -f "$file" ] && cp "$file" release-assets/SoundCore-Desktop-amd64.deb
            done
            # RPM
            for file in src-tauri/target/release/bundle/rpm/*.rpm; do
              [ -f "$file" ] && cp "$file" release-assets/SoundCore-Desktop-x86_64.rpm
            done
          else
            # Windows
            for file in src-tauri/target/release/bundle/nsis/*.exe; do
              [ -f "$file" ] && cp "$file" release-assets/SoundCore-Desktop-x64-setup.exe
            done
            for file in src-tauri/target/release/bundle/wix/*.msi; do
              [ -f "$file" ] && cp "$file" release-assets/SoundCore-Desktop-x64_en-US.msi
            done
            for file in src-tauri/target/release/*.exe; do
              [ -f "$file" ] && cp "$file" release-assets/SoundCore-Desktop.exe
            done
          fi
          
          ls -lh release-assets/ || echo "No assets prepared"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.os }}
          path: release-assets/**

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            tag="${{ inputs.version }}"
          else
            tag="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          artifacts: "release-assets/**/*"
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
